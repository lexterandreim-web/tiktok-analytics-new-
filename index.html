<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TikTok Analytics</title>
<link rel="stylesheet" href="styles.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<div class="app">

<header class="header">
    <span class="title">Video analytics</span>
</header>

<!-- VIDEO -->
<div class="video">
    <img src="preview.jpg" class="thumb">
    <div class="duration">12.77s</div>
</div>

<p class="date">Posted on Mar 14, 2026</p>

<!-- STATS -->
<div class="stats">
    <div>▶ 5,499</div>
    <div>❤ 6</div>
    <div>💬 0</div>
    <div>↗ 0</div>
    <div>🔖 0</div>
</div>

<!-- TOTAL VIEWERS -->
<section class="card">
    <div class="section-title">
        Total viewers <span class="info">i</span>
    </div>

    <div class="total-number">57</div>

    <div class="change">
        <div class="circle">↑</div>
        <div class="text">+2 <span>(vs 1d ago)</span></div>
    </div>
</section>

<!-- AGE -->
<section class="card">
    <h3>Age</h3>

    <div class="item" data-value="57">
        <div class="row">
            <span>18 - 24</span>
            <span class="percent"></span>
        </div>
        <div class="bar"><div></div></div>
    </div>

    <div class="item" data-value="37">
        <div class="row">
            <span>25 - 34</span>
            <span class="percent"></span>
        </div>
        <div class="bar"><div></div></div>
    </div>

    <div class="item" data-value="6">
        <div class="row">
            <span>Other</span>
            <span class="percent"></span>
        </div>
        <div class="bar"><div></div></div>
    </div>

</section>

</div>

<script>
function updateBars() {
    const items = document.querySelectorAll(".item");

    let total = 0;
    items.forEach(i => total += Number(i.dataset.value));

    items.forEach(i => {
        const val = i.dataset.value;
        const percent = Math.round((val / total) * 100);

        i.querySelector(".percent").textContent = percent + "%";
        i.querySelector(".bar div").style.width = percent + "%";
    });
}

updateBars();
</script>

</body>
</html>
